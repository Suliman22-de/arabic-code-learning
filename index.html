<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعلم البرمجة بالعربية</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>تعلم البرمجة بالعربية</h1>
    <p class="intro">دروس سهلة للمبتدئين مع أمثلة وأسئلة وشهادة إتمام.</p>

    <section class="card">
      <label for="studentName">اسم المتعلم:</label>
      <input id="studentName" type="text" placeholder="اكتب اسمك هنا">
    </section>

    <section class="card" id="lessonBox">
      <h2 id="lessonTitle"></h2>
      <p id="lessonText"></p>

      <h3>مثال الكود:</h3>
      <pre><code id="lessonCode"></code></pre>

      <h3>شرح الكود:</h3>
      <p id="codeExplain"></p>
    </section>

    <section class="card" id="quizBox">
      <h2>السؤال</h2>
      <p id="question"></p>
      <div id="answers"></div>
      <p id="result"></p>
      <p class="score">النقاط: <span id="score">0</span></p>
    </section>

    <button id="nextButton">الدرس التالي</button>

    <section class="certificate-section" id="certificateSection">
      <div class="certificate">
        <div class="certificate-border">
          <p class="certificate-small">منصة تعلم البرمجة بالعربية</p>
          <h2>شهادة إتمام</h2>
          <p class="certificate-text">تشهد المنصة بأن المتعلم</p>
          <h3 id="certificateName">اسم المتعلم</h3>
          <p class="certificate-text">قد أتم دورة أساسيات البرمجة للمبتدئين بنجاح</p>

          <div class="certificate-info">
            <p>النتيجة: <span id="certificateScore"></span></p>
            <p>التاريخ: <span id="certificateDate"></span></p>
          </div>

          <p class="signature">إدارة المنصة</p>
        </div>
      </div>

      <button id="printButton">طباعة الشهادة</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
